name: "🟢 Submit domains to allow"
description: Suggest one or more domains to add to the AEGIS-DNS allowlist.
title: "[allow] "
labels: [submission, type:allow, needs-validation]
body:
  - type: markdown
    attributes:
      value: |
        Use this for domains that should always be allowed (e.g. mainstream services
        accidentally blocked by upstream lists). The validator + a maintainer review
        applies; on approval, entries land in `sources/pins/allow.txt`.
  - type: textarea
    id: domains
    attributes:
      label: Domains to allow
      description: |
        One per line. FQDNs, `*.example.com` wildcards, or IPv4.
        Trailing comments allowed: `service.example.com   # internal infra`.
      placeholder: |
        my-critical-service.com
        *.cdn.partner.com
      render: text
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should this be allowed?
      description: |
        E.g. "blocked by upstream Easylist but is required for our customer portal."
    validations:
      required: true
  - type: input
    id: contact
    attributes:
      label: How can we follow up if needed?
      placeholder: "@your-handle"
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: Pre-submit checklist
      options:
        - label: I verified the domain is benign (it is not currently serving malicious content).
          required: true
