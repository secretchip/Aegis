name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run validator unit tests
        run: python3 pipeline/tests/python/test_validate.py -v

  bash-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Run reconcile-guard unit tests
        run: bash pipeline/tests/bash/test_reconcile_guard.sh

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint bash scripts
        run: |
          set -e
          # SC1091: don't follow sourced files (requires running shellcheck from
          # source dir). SC2155: declare-and-assign on the same line is fine
          # for our style; SC2086 is too aggressive against intentional word
          # splitting in glob expansion. Tighten over time.
          mapfile -t scripts < <(find pipeline -type f -name '*.sh' \! -path '*/temp/*' \! -path '*/logs/*')
          shellcheck --severity=warning --exclude=SC1091,SC2155,SC2086 "${scripts[@]}"
